<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Scoutmap</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="map-wrap" aria-label="Karta">
        <div id="map"></div>

        <div class="topbar">
          <div>
            <p class="eyebrow">Klätterscouting</p>
            <h1>Scoutmap</h1>
            <div class="save-status" id="saveStatus" aria-live="polite">Sparat lokalt</div>
          </div>
          <button class="icon-button" id="locateButton" type="button" title="Gå till min position" aria-label="Gå till min position">
            <span aria-hidden="true">⌖</span>
          </button>
        </div>

        <div class="map-actions">
          <button id="newAtCenterButton" type="button">Ny plats här</button>
          <button id="newAtMeButton" type="button">Ny vid mig</button>
          <button id="exportButton" type="button">Exportera fil</button>
          <button id="openImportButton" type="button" class="secondary">Importera fil</button>
        </div>
      </section>
    </main>

    <section id="importPanel" class="floating-panel hidden" aria-label="Importera textfil">
      <div class="panel-head">
        <div>
          <p class="eyebrow">Synk</p>
          <h2>Importera scoutmap-fil</h2>
        </div>
        <button id="closeImportButton" type="button" class="secondary">Stäng</button>
      </div>
      <p class="muted">Välj en exporterad Scoutmap-textfil. Importen slår ihop filens platser med det som redan finns lokalt.</p>
      <label>
        Scoutmap-fil
        <input id="importFileInput" type="file" accept="application/json,.json,.txt">
      </label>
      <label>
        Eller klistra in exporttext
        <textarea id="importPasteInput" placeholder="Klistra in exporterad Scoutmap-text här"></textarea>
      </label>
      <button id="pasteImportButton" type="button">Importera inklistrat</button>
      <div id="syncStatus" class="sync-status" aria-live="polite"></div>
    </section>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
  </body>
</html>
