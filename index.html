<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Scoutmap</title>
    <meta name="theme-color" content="#287c5a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Scoutmap">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="mapnotesicon.png">
    <link rel="icon" type="image/png" href="mapnotesicon.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <div id="map" aria-label="Karta"></div>

      <div class="topbar" id="topbar">
        <div class="brand">
          <p class="eyebrow">Klätterscouting</p>
          <h1>Scoutmap</h1>
          <p class="save-status" id="saveStatus">Sparat lokalt</p>
        </div>
        <button class="icon-button" id="locateButton" type="button" title="Gå till min position" aria-label="Gå till min position">⌖</button>
      </div>

      <div class="map-actions" id="mapActions">
        <button id="newAtCenterButton" type="button">Ny plats här</button>
        <button id="newAtMeButton" type="button">Ny vid mig</button>
        <button id="exportButton" type="button">Exportera</button>
        <label class="file-button">
          Importera
          <input id="importInput" type="file" accept="application/json,.json">
        </label>
      </div>
    </main>

    <template id="popupTemplate">
      <article class="place-card">
        <header class="place-card-header">
          <label class="title-label">
            <span>Namn</span>
            <input class="popup-title" type="text" placeholder="Namn på platsen">
          </label>
        </header>

        <div class="priority-row" aria-label="Prioritet">
          <button type="button" class="star" data-priority="1">☆</button>
          <button type="button" class="star" data-priority="2">☆</button>
          <button type="button" class="star" data-priority="3">☆</button>
          <button type="button" class="star" data-priority="4">☆</button>
          <button type="button" class="star" data-priority="5">☆</button>
        </div>

        <div class="block-toolbar"></div>
        <div class="popup-blocks"></div>

        <footer class="place-card-actions">
          <button type="button" class="secondary move-button">Flytta punkt</button>
          <button type="button" class="danger delete-button">Ta bort punkt</button>
        </footer>
      </article>
    </template>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
  </body>
</html>
