<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Scoutmap</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="map-wrap" aria-label="Karta">
        <div id="map"></div>

        <div class="topbar">
          <div>
            <p class="eyebrow">Klätterscouting</p>
            <h1>Scoutmap</h1>
            <div class="save-status" id="saveStatus" aria-live="polite">Sparat lokalt</div>
          </div>
          <button class="icon-button" id="locateButton" type="button" title="Gå till min position" aria-label="Gå till min position">
            <span aria-hidden="true">⌖</span>
          </button>
        </div>

        <div class="map-actions">
          <button id="newAtCenterButton" type="button">Ny plats här</button>
          <button id="newAtMeButton" type="button">Ny vid mig</button>
          <button id="showQrButton" type="button">Dela QR</button>
          <button id="openImportButton" type="button" class="secondary">Importera QR</button>
        </div>
      </section>
    </main>

    <section id="qrExportPanel" class="qr-panel floating-panel hidden" aria-label="QR-export">
      <div class="qr-panel-head">
        <div>
          <p class="eyebrow">Synk</p>
          <h2>QR-export</h2>
        </div>
        <button id="closeQrButton" type="button" class="secondary">Stäng</button>
      </div>
      <p class="muted">Skanna alla delar om det blir flera QR-koder. Bilder är inte med.</p>
      <div id="qrCodes" class="qr-codes"></div>
      <div id="syncStatus" class="sync-status" aria-live="polite"></div>
    </section>

    <section id="qrImportPanel" class="qr-panel floating-panel hidden" aria-label="QR-import">
      <div class="qr-panel-head">
        <div>
          <p class="eyebrow">Synk</p>
          <h2>QR-import</h2>
        </div>
        <button id="closeImportButton" type="button" class="secondary">Stäng</button>
      </div>
      <div class="sync-actions">
        <button id="startScanButton" type="button">Starta kamera</button>
        <button id="stopScanButton" type="button" class="secondary">Stoppa kamera</button>
      </div>
      <div id="qrReader" class="qr-reader"></div>
      <label>
        Klistra in QR-data manuellt
        <textarea id="qrPasteInput" placeholder="Klistra in en eller flera QR-texter här"></textarea>
      </label>
      <button id="pasteImportButton" type="button">Importera inklistrat</button>
    </section>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
